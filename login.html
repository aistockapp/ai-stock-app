<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>修改密码</title>
<style>
    body{background:#121212;color:#fff;font-family:system-ui;padding:40px 20px;margin:0;}
    .box{max-width:360px;margin:auto;background:#1a1a2e;padding:30px;border-radius:16px;box-sizing:border-box;}
    input{width:100%;padding:12px 14px;margin:9px 0;border-radius:10px;border:none;background:#1e293b;color:#fff;font-size:15px;box-sizing:border-box;}
    button{width:100%;padding:13px;background:#00d9ff;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:bold;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>

<div class="box">
    <h3>修改密码</h3>
    <input id="old_pwd" placeholder="原密码" type="password">
    <input id="new1" placeholder="新密码" type="password">
    <input id="new2" placeholder="确认新密码" type="password">
    <button onclick="save()">保存</button>
</div>

<script>
function save() {
    let old = document.getElementById("old_pwd").value.trim();
    let new1 = document.getElementById("new1").value.trim();
    let new2 = document.getElementById("new2").value.trim();

    let realPwd = localStorage.password || "123456";

    if (old !== realPwd) {
        alert("原密码错误");
        return;
    }
    if (new1 !== new2) {
        alert("两次新密码不一致");
        return;
    }
    localStorage.password = new1;
    alert("修改成功！");
    location.href = "login.html";
}
</script>
</body>
</html>
