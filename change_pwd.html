<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI盯盘登录</title>
<style>
    body{background:#121212;color:#fff;font-family:system-ui;padding:40px 20px;margin:0;}
    .login-box{max-width:360px;margin:auto;background:#1a1a2e;padding:30px;border-radius:16px;box-sizing:border-box;}
    input{width:100%;padding:12px 14px;margin:9px 0;border-radius:10px;border:none;background:#1e293b;color:#fff;font-size:15px;box-sizing:border-box;}
    button{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:bold;margin-top:8px;cursor:pointer;}
    .btn-login{background:#00d9ff;color:#000;}
    .btn-change{background:#444;color:#fff;}
</style>
</head>
<body>

<div class="login-box">
    <h2>AI超短线擒牛系统</h2>
    <input id="user" placeholder="账号" type="text">
    <input id="pwd" placeholder="密码" type="password">
    <button class="btn-login" onclick="login()">登录</button>
    <button class="btn-change" onclick="location.href='change_pwd.html'">修改密码</button>
</div>

<script>
let USER = localStorage.getItem("username") || "admin";
let PWD  = localStorage.getItem("password") || "123456";

function login() {
    let u = document.getElementById("user").value.trim();
    let p = document.getElementById("pwd").value.trim();
    if (u === USER && p === PWD) {
        alert("登录成功");
        location.href = "main.html";
    } else {
        alert("账号或密码错误");
    }
}
</script>
</body>
</html>
